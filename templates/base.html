<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}login-python{% endblock %}</title>
  <style>
    :root { font-family: system-ui, sans-serif; line-height: 1.5; }
    body { max-width: 40rem; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    nav { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #ddd; }
    nav a { color: #0b57d0; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    .meta { color: #555; font-size: 0.9rem; }
    .error { background: #ffe8e8; border: 1px solid #f5b5b5; padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; }
    input[type="text"], input[type="password"] { width: 100%; max-width: 20rem; padding: 0.4rem 0.5rem; margin-top: 0.25rem; }
    button, .btn { cursor: pointer; padding: 0.45rem 0.9rem; border-radius: 6px; border: 1px solid #ccc; background: #f7f7f7; font-size: 1rem; }
    button.primary { background: #0b57d0; color: #fff; border-color: #0b57d0; }
    ul.pages { padding-left: 1.2rem; }
  </style>
</head>
<body>
  <nav>
    <a href="/">ホーム</a>
    <a href="/public">公開ページ</a>
    <a href="/member">会員エリア</a>
    <a href="/reports">レポート</a>
    <a href="/admin">管理</a>
    {% if user %}
      <span class="meta">{{ user.display_name }}（{{ user.role.value }}）</span>
      <form action="/logout" method="post" style="margin:0;">
        <button type="submit">ログアウト</button>
      </form>
    {% else %}
      <a href="/login" class="btn">ログイン</a>
    {% endif %}
  </nav>
  <main>
    {% block body %}{% endblock %}
  </main>
</body>
</html>
